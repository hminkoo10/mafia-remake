app = "mafia-remake"        # fly launch 후 생성된 앱 이름으로 변경
primary_region = "nrt"     # 도쿄 (한국과 가장 가까운 리전)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8802
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
