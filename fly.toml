# fly.toml app configuration file generated for mafia-remake on 2026-06-18T17:26:06+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mafia-remake'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 2053
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
